  # Iter 58: pixel-based visual fidelity tests for the Sara-baseline scenes.
  # The existing sara_w_alone / sara_d_alone tests verify OAM attr at f=68
  # (passes because hwoam_recolor stamps pal 2/1 regardless of DF1F), but
  # the rendered Sara is GRAY at f=68 — the savestate captures stale OBP
  # CRAM and DF1F > 0 blocks cond_pal from reloading until ~f=255 (per
  # iter 53 finding). These tests sample at frames=300 (post DF1F drain)
  # to verify SaraWitch / SaraDragon palette colors actually reach CRAM.
  # Separate from the f=68 OAM tests because shadow_main races the game
  # at f=300 and produces slot 0/2 OAM alternation (iter 53), but the
  # rendered pixels still include the correct SaraWitch / SaraDragon hues
  # because most of Sara's 16x16 region is still covered by pal-2/1 slots.
  - name: "sara_w_pink_render"
    savestate: "level1_sara_w_alone.ss0"
    description: "Sara W must render PINK at f=300 (proves SaraWitch CRAM loaded by cond_pal) + Dungeon BG light-teal"
    frames: 300
    expected_boss_flag: 0
    check_boss_flag: false  # OAM alternation at f=300 makes FFBF noisy
    pixel_expectations:
      # Iter 89: raised min from 5 to 15. Observed counts stable at 26/21
      # across 5 fresh runs, so 15 still has 1.4x+ headroom but catches
      # a partial-corruption case where the count drops to single digits
      # without going all the way to 0.
      - color: "FF42A5"
        min_pixels: 15
        description: "SaraWitch pink-red (OBP 2 idx 1 = 0x511F) present"
      - color: "F7AD5A"
        min_pixels: 15
        description: "SaraWitch peach (OBP 2 idx 2 = 0x2EBE) present"
      # Iter 70: adversarial-test finding — palette_loader's BG palette
      # write path (FF68/FF69, runs FIRST in cond_pal) is the only
      # one that empirically lands cleanly under the corruption probe.
      # 6855 pixels of #A5A5B5 (Dungeon BG idx 1 light teal, 0x7E94
      # mGBA-corrected) appear stably across 5 fresh runs. Floor at
      # 4000. Catches BG-CRAM regressions (corrupted BG pal 0 source
      # would flip these pixels to whatever color the corruption is).
      - color: "A5A5B5"
        min_pixels: 4000
        description: "Dungeon BG light-teal — guards BG palette CRAM load path"

  - name: "sara_d_green_render"
    # Iter 73 audit: this test is largely a no-op for ROM-source
    # regressions. sara_d_alone.ss0 captures OBP 1 CRAM already loaded
    # with SaraDragon green, AND has DF1F=0xFF so JP COLORIZE is gated
    # for ~255 frames after load. By f=300 cond_pal HAS run, palette_
    # loader writes from ROM source — but the rendered #00A500 pixels
    # at f=300 (25 of them) come from BG-pal-3 background tiles around
    # Sara's position, NOT from her OBJ sprite. Zeroing all 15 0xE003
