  # Iter 71 abandoned experiment: a "sara_d_green_force_invalidate" test
  # using force_df00: 0xFF every frame was tried as a SaraDragon
  # corruption catcher (per the iter-70 adversarial probe). It turned
  # out to break the clean case too — forcing DF00 cache invalidation
  # makes palette_loader run on every VBlank, but its OBP 1 write
  # timing is sensitive enough that running it that often actually
  # corrupts the clean OBP 1 instead of stabilizing it. Empirical:
  #   clean ROM + force_df00:    green=0 (TEST FAILS — should be 25)
  #   corrupted ROM + force_df00: green=0 (TEST FAILS — expected)
  # The force_df00 option is kept in the runner as future infrastructure
  # but no test currently uses it. Properly catching SaraDragon CRAM
  # regressions needs a different mechanism (e.g. direct CRAM probe at
