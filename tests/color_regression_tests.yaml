    # in the suite as a smoke check that "BG-pal-3 isn't catastrophically
    # broken" but it doesn't actually verify the SaraDragon palette
    # source. See project_adversarial_coverage.md for the full audit.
    savestate: "level1_sara_d_alone.ss0"
