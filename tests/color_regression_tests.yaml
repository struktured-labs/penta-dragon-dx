  # Iter 51 finding: of 20 sampled savestates, only one
  # (level1_sara_w_right_before_secret_stage_trigger_gbc.ss0) has a Sara
  # secondary tile (0x10-0x1F) visible at frame 68. Single-frame probe shows
  # the colorizer DOES write pal 2 (correct iter-31 remap), but the 5-sample
  # consensus filter (frames 58/60/62/65/68) votes pal 4 — game's main loop
  # overwrites attr between hwoam_recolor stamps, and only one of the five
  # samples catches the post-stamp moment. This is the same timing-shift
  # class that iter 8/43 hit. NOT added as a live test — verify_colorizer_
  # bytes.py at bank13:0x6A41 = 0x1B is the cleaner safety net for the
  # iter-31 tile-remap regression.

  # Iter 110-111: attempted live-gameplay lava tests via the level-select
  # probe technique. Hit a reachability blocker — the savestates capture
  # stage entry corridors, NOT the actual lava room (Sara needs to navigate
  # into it which random walks can't achieve). However iter 111's WRAM probe
  # confirmed the lava override IS firing correctly: DA00[0x19/0x1A] = 0x05
  # at f=60/200/400 in stage7_ffba6_levelselect.ss0.
  #
  # Iter 112: convert iter 111's WRAM probe finding into a regression test.
  # This is the FIRST test that verifies build_lava_override fires from a
  # NATIVELY-CAPTURED FFBA=6 savestate (not via test-framework force_ffba
  # manipulation). Catches a regression class the existing lava_stage5/7
  # _override tests can't: if the override stopped firing every-frame and
  # only ran on scene change (per iter 17 fix), force_ffba tests would
  # still pass (the framework re-applies on every test run) but a real
  # savestate load wouldn't get the override re-applied after the cold-boot
  # DA00 copy.
  - name: "stage7_lava_override_native_save"
    savestate: "stage7_ffba6_levelselect.ss0"
    description: "Live stage 7 savestate (native FFBA=6). Verifies build_lava_override fires correctly from real savestate state (iter 111 WRAM probe confirms DA00[0x19/0x1A]=05)."
    check_boss_flag: false
    bg_table_expectations:
      - tile_range: [0x19, 0x19]
        palette: 5
        description: "Stage 7 molten tile 0x19 → pal 5 (lava override fires in native FFBA=6 savestate)"
      - tile_range: [0x1A, 0x1A]
        palette: 5
        description: "Stage 7 molten tile 0x1A → pal 5 (lava override fires in native FFBA=6 savestate)"

  - name: "stage5_lava_override_native_save"
    savestate: "stage5_ffba4_levelselect.ss0"
    description: "Live stage 5 savestate (native FFBA=4). Verifies build_lava_override fires for stage 5 molten IDs."
    check_boss_flag: false
    bg_table_expectations:
      - tile_range: [0x02, 0x05]
        palette: 5
        description: "Stage 5 molten IDs 0x02-0x05 → pal 5 (lava override fires in native FFBA=4 savestate)"
      - tile_range: [0x12, 0x15]
        palette: 5
        description: "Stage 5 molten IDs 0x12-0x15 → pal 5 (lava override fires in native FFBA=4 savestate)"

  - name: "stage4_no_lava_override_native"
